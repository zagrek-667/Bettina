<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bettina</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Bettina</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>Home</h2>
            <p>This is the home section with some introductory content.</p>
            <audio controls id="background-audio">
                <source src="audio/background.mp3" type="audio/mpeg">
                Your browser does not support the audio tag.
            </audio>
        </section>
        <section id="about">
            <h2>About</h2>
            <p>Complete narrative content goes here. Talk about Bettina's story and purpose.</p>
        </section>
        <section id="contact">
            <h2>Contact</h2>
            <p>Contact information will be available here.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Bettina. All rights reserved.</p>
    </footer>
    <script>
        const audio = document.getElementById('background-audio');
        audio.onerror = function() {
            console.error('Error loading audio file. Please check the file path or format.');
            alert('Audio could not be loaded.');
        };
    </script>
</body>
</html>
